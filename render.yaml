services:
  - type: web
    name: medical-diagnosis-assistant
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python model/train_model.py && alembic upgrade head && python scripts/seed_database.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: logs/app.log
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SQLALCHEMY_ECHO
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: medical-diagnosis-db
          property: connectionString

databases:
  - name: medical-diagnosis-db
    plan: free
