<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Disease Prediction Assistant is an academic clinical decision support project for symptom-based disease prediction.">
<meta name="theme-color" content="#000666">
<meta property="og:title" content="Disease Prediction Assistant">
<meta property="og:description" content="Symptom-based disease prediction project with records and admin monitoring.">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
<link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
body{opacity:0}html.app-ready body{opacity:1}.material-symbols-outlined{visibility:hidden}html.app-icons-ready .material-symbols-outlined{visibility:visible}.material-symbols-outlined::before{content:attr(data-icon)}
</style>
<script>
(function () {
    var savedTheme = localStorage.getItem("medscope-theme");
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
}());
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link id="app-stylesheet" rel="stylesheet" href="{{ url_for('static', filename='css/stitch.css') }}?v=2026062704">
<script>
(function () {
    function showPage() {
        document.documentElement.classList.add("app-ready");
    }

    function showIcons() {
        document.documentElement.classList.add("app-icons-ready");
        showPage();
    }

    function stylesheetReady() {
        var link = document.getElementById("app-stylesheet");

        if (!link || link.sheet) {
            return Promise.resolve();
        }

        return new Promise(function (resolve) {
            link.addEventListener("load", resolve, { once: true });
            link.addEventListener("error", resolve, { once: true });
        });
    }

    var fontsReady = document.fonts && document.fonts.load
        ? Promise.all([
            document.fonts.load("400 24px Inter"),
            document.fonts.load("400 24px Material Symbols Outlined")
        ])
        : Promise.resolve();

    Promise.all([stylesheetReady(), fontsReady]).then(showIcons).catch(showPage);
    window.addEventListener("load", showPage, { once: true });
    window.setTimeout(showIcons, 2500);
}());
</script>
<noscript><style>body{opacity:1}.material-symbols-outlined{visibility:visible}</style></noscript>
<script src="{{ url_for('static', filename='js/search.js') }}" defer></script>
